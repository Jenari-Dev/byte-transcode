# Byte Transcode Server — Docker Compose
#
# Deploy on your NAS/Docker host. Edit the volumes below to match your setup.
#
# Usage:
#   docker compose up -d
#
# First time:
#   Open http://YOUR_NAS_IP:5800 and create your admin account.

services:
  byte-server:
    image: python:3.12-slim
    container_name: byte-server
    restart: unless-stopped
    ports:
      - "5800:5800"
    volumes:
      # Server code — maps your local file AS byte_server.py inside the container
      - ./app/byte_server_v3.py:/app/byte_server.py:ro
      # Frontend
      - ./app/static:/app/static:ro
      # Persistent config + database
      - ./config:/config
      # Your media library (read-only) — change /mnt/media to your actual path
      - /mnt/media:/media:ro
    working_dir: /app
    command: >
      bash -c "pip install flask --quiet --break-system-packages 2>/dev/null &&
               python3 /app/byte_server.py --port 5800"
    environment:
      - TZ=UTC
