<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo,createContext,useContext}=React;

/*═══ THEMES ═══*/
const TH={
dark:{bg:'#0A0E14',sb:'#0D1117',card:'rgba(255,255,255,0.03)',cs:'#12161e',bd:'rgba(255,255,255,0.06)',tx:'#CFD8DC',t2:'#546E7A',t3:'#78909C',t1:'#ECEFF1',ac:'#E040FB',a2:'#7C4DFF',ok:'#66BB6A',er:'#EF5350',wn:'#FFB74D',in:'#29B6F6'},
carbon:{bg:'#161616',sb:'#1C1C1C',card:'rgba(255,255,255,0.04)',cs:'#222',bd:'rgba(255,255,255,0.08)',tx:'#C6C6C6',t2:'#6F6F6F',t3:'#8D8D8D',t1:'#F4F4F4',ac:'#0F62FE',a2:'#4589FF',ok:'#42BE65',er:'#DA1E28',wn:'#F1C21B',in:'#4589FF'},
cobalt:{bg:'#1B2B34',sb:'#16242C',card:'rgba(255,255,255,0.04)',cs:'#1a2e3a',bd:'rgba(255,255,255,0.08)',tx:'#A7ADBA',t2:'#65737E',t3:'#A7ADBA',t1:'#D8DEE9',ac:'#F99157',a2:'#FAC863',ok:'#99C794',er:'#EC5F67',wn:'#FAC863',in:'#6699CC'},
};
const HDR_C={'DoVi':{c:'#E040FB',b:'rgba(224,64,251,0.15)'},'HDR10':{c:'#FF9100',b:'rgba(255,145,0,0.15)'},'HDR10+':{c:'#00E5FF',b:'rgba(0,229,255,0.15)'},'HLG':{c:'#76FF03',b:'rgba(118,255,3,0.15)'},'SDR':{c:'#90A4AE',b:'rgba(144,164,174,0.1)'}};

/*═══ ICONS ═══*/
const I=({n,s=16,c='currentColor'})=>{const d={monitor:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>,folder:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,cpu:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/></svg>,settings:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852 1.002 1.51 1H21a2 2 0 0 1 0 4h-.09c-.66 0-1.25.398-1.51 1z"/></svg>,zap:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,clock:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,check:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,x:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,hdd:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>,play:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>,pause:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,stop:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>,up:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><polyline points="18 15 12 9 6 15"/></svg>,down:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,refresh:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,search:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,log:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,user:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,download:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,copy:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,skip:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>,heart:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,key:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,alert:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,bell:<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,};return d[n]||null;};

/*═══ API ═══*/
function copyText(txt){try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt)}else{const t=document.createElement('textarea');t.value=txt;t.style.cssText='position:fixed;left:-9999px';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)}}catch(e){}}
function useApi(ep,ms){const[d,setD]=useState(null);const f=useCallback(()=>{fetch('/api'+ep,{credentials:'include'}).then(r=>r.ok?r.json():null).then(setD).catch(()=>{});},[ep]);useEffect(()=>{f();if(ms){const iv=setInterval(f,ms);return()=>clearInterval(iv)}},[f,ms]);return{data:d,refresh:f};}
const post=(ep,body)=>fetch('/api'+ep,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body||{})}).then(r=>r.json()).catch(()=>null);
const put=(ep,body)=>fetch('/api'+ep,{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body||{})}).then(r=>r.json()).catch(()=>null);
const del=(ep)=>fetch('/api'+ep,{method:'DELETE',credentials:'include'}).then(r=>r.json()).catch(()=>null);
// v3.23 — Tools sidebar: [label, icon, theme-color-key]. Order is user-draggable
// and drives job priority (higher = claimed first).
const TOOL_DEFS={transcode:['Transcoder','zap','ac'],subgen:['AI Subtitles','log','ok'],remuxclean:['Audio Cleanup','check','in'],dv78only:['DV → P8','play','a2'],compatfix:['Compatibility','alert','wn']};
const TOOL_KEYS=Object.keys(TOOL_DEFS);

/*═══ TOAST ═══*/
const TC=createContext();
function Toasts({children}){
    const[ts,set]=useState([]);
    const add=useCallback((m,t='info')=>{const id=Date.now();set(p=>[...p,{id,m,t}]);setTimeout(()=>set(p=>p.filter(x=>x.id!==id)),3500);},[]);
    return <TC.Provider value={add}>{children}
        <div style={{position:'fixed',bottom:20,right:20,zIndex:999,display:'flex',flexDirection:'column',gap:8}}>
            {ts.map(t=>{const c=t.t==='success'?'#66BB6A':t.t==='error'?'#EF5350':'#29B6F6';
                return <div key={t.id} style={{padding:'10px 18px',borderRadius:8,background:`${c}22`,border:`1px solid ${c}`,color:c,fontSize:13,fontWeight:600,animation:'fadeIn 0.2s'}}>{t.m}</div>})}
        </div></TC.Provider>;
}

/*═══ ERROR BOUNDARY ═══*/
class ErrorBoundary extends React.Component{
    constructor(props){super(props);this.state={error:null,info:null};}
    static getDerivedStateFromError(error){return{error};}
    componentDidCatch(error,info){this.setState({info});console.error('React Error:',error,info);}
    render(){
        if(this.state.error){
            return React.createElement('div',{style:{padding:40,background:'#0A0E14',color:'#EF5350',minHeight:'100vh',fontFamily:'monospace'}},
                React.createElement('h1',{style:{marginBottom:20,color:'#E040FB'}},'Byte Transcode — Render Error'),
                React.createElement('pre',{style:{background:'#12161e',padding:20,borderRadius:8,overflow:'auto',fontSize:13,lineHeight:1.6,color:'#CFD8DC'}},
                    this.state.error.toString()+'\n\n'+(this.state.info?.componentStack||'')),
                React.createElement('button',{onClick:()=>window.location.reload(),style:{marginTop:20,padding:'10px 20px',background:'#E040FB',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:14}},'Reload')
            );
        }
        return this.props.children;
    }
}

/*═══ TOGGLE ═══*/
function Tog({on,onTog,T}){return <div onClick={onTog} style={{width:40,height:22,borderRadius:11,background:on?T.ac:`${T.t2}40`,position:'relative',cursor:'pointer',transition:'0.2s',flexShrink:0}}>
    <div style={{width:18,height:18,borderRadius:9,background:'#fff',position:'absolute',top:2,left:on?20:2,transition:'0.2s'}}/></div>;}

/*═══ LOGIN ═══*/
function Login({onAuth,setup}){
    const[u,setU]=useState('');const[p,setP]=useState('');const[e,setE]=useState('');const[showReset,setShowReset]=useState(false);
    const go=async()=>{if(!u||!p){setE('Username and password required');return;}const r=await post(setup?'/auth/setup':'/auth/login',{username:u,password:p});if(r?.ok)onAuth();else setE(r?.error||'Failed');};
    const T=TH.dark;
    const resetCmd='docker exec byte-server python3 /app/byte_server.py --set-password NEW_PASSWORD';
    return <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{background:T.sb,borderRadius:14,padding:'44px 40px',border:`1px solid ${T.bd}`,width:380,textAlign:'center'}}>
            <div style={{fontSize:36,fontWeight:800,color:T.ac,letterSpacing:'-1px',lineHeight:1,marginBottom:4}}>BYTE</div>
            <div style={{fontSize:11,color:T.t2,letterSpacing:'3px',fontWeight:600,marginBottom:36}}>TRANSCODE v3.30</div>
            {setup&&<div style={{fontSize:13,color:T.ac,marginBottom:16,padding:'10px 14px',background:`${T.ac}15`,borderRadius:8}}>First time — create your admin account</div>}
            {e&&<div style={{fontSize:13,color:T.er,marginBottom:14}}>{e}</div>}
            <input value={u} onChange={ev=>setU(ev.target.value)} placeholder="Username" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14,marginBottom:12}}/>
            <input value={p} onChange={ev=>setP(ev.target.value)} onKeyDown={ev=>ev.key==='Enter'&&go()} type="password" placeholder="Password" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14,marginBottom:18}}/>
            <button onClick={go} style={{width:'100%',background:`linear-gradient(135deg,${T.ac},${T.a2})`,border:'none',borderRadius:10,padding:'13px',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>{setup?'Create Account':'Login'}</button>
            {!setup&&<div style={{marginTop:16}}>
                <button onClick={()=>setShowReset(s=>!s)} style={{background:'none',border:'none',color:T.t2,fontSize:12,cursor:'pointer',textDecoration:'underline'}}>Forgot password?</button>
                {showReset&&<div style={{marginTop:12,textAlign:'left',fontSize:12,color:T.t3,lineHeight:1.5}}>
                    Run this on the machine hosting the server (SSH into your NAS), replacing NEW_PASSWORD:
                    <div style={{position:'relative',marginTop:8}}>
                        <div className="mono" style={{fontSize:11,background:T.bg,border:`1px solid ${T.bd}`,borderRadius:6,padding:'9px 10px',color:T.tx,wordBreak:'break-all'}}>{resetCmd}</div>
                        <button onClick={()=>{if(navigator.clipboard)navigator.clipboard.writeText(resetCmd);setE('Command copied');}} style={{marginTop:6,background:`${T.ac}15`,border:`1px solid ${T.ac}44`,borderRadius:6,padding:'5px 12px',color:T.ac,fontSize:11,fontWeight:600,cursor:'pointer'}}>Copy command</button>
                    </div>
                    <div style={{marginTop:8,color:T.t2}}>Then log in with the new password. (Not on Docker? Run the same with <span className="mono">--set-password</span> on your server file.)</div>
                </div>}
            </div>}
        </div></div>;
}

/*═══ SETTING BOX ═══*/
function SB({title,desc,children,T}){return <div style={{background:T.card,borderRadius:10,padding:'18px 22px',border:`1px solid ${T.bd}`,marginBottom:14}}>
    <div style={{fontSize:14,fontWeight:600,color:T.t1,marginBottom:3}}>{title}</div>
    {desc&&<div style={{fontSize:12,color:T.t2,marginBottom:14}}>{desc}</div>}
    {children}</div>;}

/*═══ STEP LOG VIEWER ═══*/
function StepLog({logs=[],T}){
    const[open,setOpen]=useState({});
    const steps=useMemo(()=>{const s=[];let cur={title:'Initialization',logs:[],ok:true};
        logs.forEach(l=>{const m=(l.message||'').match(/\[Step (\d+\/\d+)\]\s*(.*)/);
            if(m){if(cur.logs.length)s.push(cur);cur={title:`[Step ${m[1]}] ${m[2]}`,logs:[l],ok:l.level!=='ERROR'};}
            else{cur.logs.push(l);if(l.level==='ERROR')cur.ok=false;}});
        if(cur.logs.length)s.push(cur);return s;},[logs]);

    return <div style={{borderRadius:8,border:`1px solid ${T.bd}`,overflow:'hidden'}}>
        {steps.map((st,i)=><div key={i}>
            <div onClick={()=>setOpen(o=>({...o,[i]:!o[i]}))} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',background:open[i]?T.cs:T.card,cursor:'pointer',borderBottom:`1px solid ${T.bd}`}}>
                <span style={{color:T.t2,fontSize:11,transform:open[i]?'rotate(90deg)':'',transition:'0.2s'}}>▶</span>
                {st.ok?<I n="check" s={14} c={T.ok}/>:<I n="x" s={14} c={T.er}/>}
                <span style={{flex:1,fontSize:13,fontWeight:500,color:T.t1}}>{st.title}</span>
                <span className="mono" style={{fontSize:11,color:T.t2}}>{st.logs.length} lines</span>
            </div>
            {open[i]&&<div className="mono" style={{background:'#08090c',padding:10,fontSize:11,lineHeight:'17px',maxHeight:300,overflowY:'auto',borderBottom:`1px solid ${T.bd}`}}>
                {st.logs.map((l,j)=><div key={j} style={{display:'flex',gap:8,marginBottom:1}}>
                    <span style={{color:T.t2,opacity:0.4,minWidth:24,textAlign:'right'}}>{j+1}</span>
                    <span style={{color:T.t2,opacity:0.5,minWidth:70}}>{(l.timestamp||'').slice(11)}</span>
                    <span style={{color:l.level==='ERROR'?T.er:l.level==='WARN'?T.wn:T.in,fontWeight:600,minWidth:42}}>[{l.level}]</span>
                    <span style={{color:l.level==='ERROR'?T.er:T.t2}}>{l.message}</span>
                </div>)}
            </div>}
        </div>)}
        {steps.length===0&&<div style={{padding:20,textAlign:'center',color:T.t2}}>No log entries yet</div>}
    </div>;
}

/*═══ FILE DETAIL MODAL ═══*/
function FileModal({item,T,onClose,onAct}){
    const[tab,setTab]=useState(item._tab||'info');
    const[logs,setLogs]=useState([]);
    const iv=useRef();const toast=useContext(TC);
    const getLogs=useCallback(()=>{fetch(`/api/logs?job_id=${item.id}&limit=300`,{credentials:'include'}).then(r=>r.ok?r.json():[]).then(d=>setLogs(Array.isArray(d)?d.reverse():[])).catch(()=>{});},[item.id]);
    useEffect(()=>{getLogs();if(item.status==='processing')iv.current=setInterval(getLogs,3000);return()=>clearInterval(iv.current);},[item.status,getLogs]);

    const hdr=HDR_C[item.hdr_type]||HDR_C.SDR;
    const act=async(a)=>{await onAct(item.id,a);toast(a==='cancel'?'Cancelled':a==='accept'?'Accepted':a==='requeue'?'Requeued':'Done',a==='cancel'?'error':'success');};

    return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fadeIn 0.15s'}}>
        <div onClick={e=>e.stopPropagation()} style={{background:T.cs,border:`1px solid ${T.bd}`,borderRadius:14,width:'100%',maxWidth:920,maxHeight:'88vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 30px 80px rgba(0,0,0,0.5)'}}>
            <div style={{padding:'18px 24px',borderBottom:`1px solid ${T.bd}`,display:'flex',justifyContent:'space-between',gap:12}}>
                <div style={{minWidth:0}}><div style={{fontSize:16,fontWeight:700,color:T.t1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.file_name}</div>
                    <div className="mono" style={{fontSize:11,color:T.t2,marginTop:3}}>{item.file_path}</div></div>
                <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:T.t3,padding:4}}><I n="x" s={20}/></button>
            </div>
            <div style={{display:'flex',borderBottom:`1px solid ${T.bd}`}}>

                        {['error','skipped','cancelled'].includes(item.status)&&<button onClick={()=>act('requeue')} style={{background:`${T.in}15`,border:`1px solid ${T.in}44`,borderRadius:8,padding:'8px 16px',cursor:'pointer',color:T.in,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:5}}><I n="refresh" s={13}/> Requeue</button>}

                        <button onClick={()=>{const b=new Blob([logs.map(l=>`[${l.timestamp}] [${l.level}] ${l.message}`).join('\n')],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`job-${item.id}.log`;a.click();}} style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:6,padding:'6px 14px',cursor:'pointer',color:T.t3,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><I n="download" s={12}/> Download</button>
                    </div>
                    <StepLog logs={logs} T={T}/>
                </>}
            </div>
        </div></div>;
}

/*═══ MAIN APP ═══*/
function App(){
    const[authed,setAuthed]=useState(false);const[setup,setSetup]=useState(false);
    const[tab,setTab]=useState('overview');const[theme,setTheme]=useState('dark');
    const[qTab,setQTab]=useState('queued');const[search,setSearch]=useState('');const[sort,setSort]=useState('priority');
    const[hdrF,setHdrF]=useState('all');const[libF,setLibF]=useState('all');const[qTypeT,setQTypeT]=useState('transcode');
    const[settingsTab,setSettingsTab]=useState('transcode');
    const[newLib,setNewLib]=useState({name:'',path:''});const[xWorker,setXWorker]=useState(null);
    const[nodeCfg,setNodeCfg]=useState(null);
    useEffect(()=>{setNodeCfg(null);if(xWorker){fetch('/api/workers/'+xWorker+'/config',{credentials:'include'}).then(r=>r.ok?r.json():{}).then(c=>setNodeCfg(c||{})).catch(()=>setNodeCfg({}));}},[xWorker]);
    // v3.10 — per-node enabled state for the ON/OFF switch on worker cards
    const[nodeOn,setNodeOn]=useState({});
    const workerIds=(allW||[]).map(w=>w.id).sort().join(',');
    useEffect(()=>{(allW||[]).forEach(w=>{fetch('/api/workers/'+w.id+'/config',{credentials:'include'}).then(r=>r.ok?r.json():{}).then(c=>setNodeOn(m=>({...m,[w.id]:(c||{}).node_enabled!=='false'}))).catch(()=>{});});},[workerIds]);
    const[lSettings,setLS]=useState(null);const[selFile,setSelFile]=useState(null);const[skipGb,setSkipGb]=useState('');
    const[page,setPage]=useState(1);const[perPage,setPerPage]=useState(100);
    const[showPaths,setShowPaths]=useState(false);const[colFilter,setColFilter]=useState({lib:'',file:'',codec:'',res:'',size:''});
    const T=TH[theme]||TH.dark;const toast=useContext(TC);
    // v3.14 — update checker (bell). Polls the server, which compares running
    // versions against the published manifest on GitHub (cached server-side).
    const[upd,setUpd]=useState(null);const[updOpen,setUpdOpen]=useState(false);const[scanOpen,setScanOpen]=useState(false);
    const checkUpdate=useCallback((force)=>{fetch('/api/updates/check'+(force?'?force=1':''),{credentials:'include'}).then(r=>r.json()).then(setUpd).catch(()=>{});},[]);
    useEffect(()=>{checkUpdate(false);const iv=setInterval(()=>checkUpdate(false),1800000);return()=>clearInterval(iv);},[checkUpdate]);

    useEffect(()=>{fetch('/api/auth/status',{credentials:'include'}).then(r=>r.json()).then(d=>{if(d.needs_setup)setSetup(true);else if(d.authenticated)setAuthed(true);}).catch(()=>setAuthed(true))},[]);

    const{data:dash,refresh:rD}=useApi('/dashboard',2500);
    const{data:queue,refresh:rQ}=useApi('/queue?sort='+sort+(qTab!=='all'?'&status='+qTab:'')+'&job_type='+qTypeT,2500);
    const{data:allW,refresh:rW}=useApi('/workers',3000);
    const{data:libs,refresh:rL}=useApi('/libraries',5000);
    const{data:settings,refresh:rS}=useApi('/settings',10000);
    // v3.23 — draggable Tools priority order
    const[toolOrder,setToolOrder]=useState(TOOL_KEYS);const[dragTool,setDragTool]=useState(null);
    useEffect(()=>{if(settings?.tool_priority_order){try{const o=JSON.parse(settings.tool_priority_order);if(Array.isArray(o)){const v=o.filter(t=>TOOL_KEYS.includes(t));setToolOrder([...v,...TOOL_KEYS.filter(t=>!v.includes(t))]);}}catch(e){}}},[settings]);
    const reorderTools=(target)=>{if(!dragTool||dragTool===target){setDragTool(null);return;}const no=toolOrder.filter(t=>t!==dragTool);no.splice(no.indexOf(target),0,dragTool);setToolOrder(no);setDragTool(null);put('/settings',{tool_priority_order:JSON.stringify(no)}).then(()=>rS());toast('Tool priority updated','success');};
    const{data:logs,refresh:rLg}=useApi('/logs?limit=300',5000);
    const{data:stats}=useApi('/stats',8000);
    useEffect(()=>{if(settings&&!lSettings)setLS({...settings})},[settings]);
    useEffect(()=>{if(settings?.theme&&TH[settings.theme])setTheme(settings.theme)},[settings]);

    const s=dash||{status_stats:{},status_stats_by_type:{},workers:[],processing:[],recent_complete:[],saved_gb:0,processing_enabled:false,scan_progress:{},hdr_stats:{}};
    const gc=st=>(s.status_stats[st]||{}).count||0;
    const gcType=(jt,st)=>(s.status_stats_by_type?.[jt]||{})[st]||0;
    const gcTypeTotal=jt=>{const m=s.status_stats_by_type?.[jt]||{};return Object.values(m).reduce((a,b)=>a+b,0);};
    const totalQ=gc('queued')+gc('pending');

    const workers=useMemo(()=>{
        const aw=allW||[];const dw=s.workers||[];const map=new Map();
        aw.forEach(w=>map.set(w.id,{...w}));
        dw.forEach(w=>{const e=map.get(w.id);map.set(w.id,e?{...e,...w}:{...w});});
        const did=new Set(dw.map(w=>w.id));
        return Array.from(map.values()).map(w=>({...w,_on:did.has(w.id),_stale:!did.has(w.id)&&!!w.last_heartbeat}));
    },[allW,s.workers]);

    const items=useMemo(()=>{let q=queue||[];
        if(hdrF!=='all')q=q.filter(i=>i.hdr_type===hdrF);
        if(libF!=='all')q=q.filter(i=>i.library_name===libF);
        if(search)q=q.filter(i=>i.file_name.toLowerCase().includes(search.toLowerCase()));
        if(colFilter.lib)q=q.filter(i=>(i.library_name||'').toLowerCase().includes(colFilter.lib.toLowerCase()));
        if(colFilter.file)q=q.filter(i=>(i.file_name||'').toLowerCase().includes(colFilter.file.toLowerCase()));
        if(colFilter.codec)q=q.filter(i=>(i.video_codec||'').toLowerCase().includes(colFilter.codec.toLowerCase()));
        if(colFilter.res)q=q.filter(i=>(i.resolution||'').toLowerCase().includes(colFilter.res.toLowerCase()));
        return q;},[queue,hdrF,libF,search,colFilter]);
    const totalPages=Math.max(1,Math.ceil(items.length/perPage));
    const pageItems=useMemo(()=>items.slice((page-1)*perPage,page*perPage),[items,page,perPage]);
    useEffect(()=>{setPage(1);},[qTab,qTypeT,search,hdrF,libF,colFilter]);
    const libNms=useMemo(()=>[...new Set((queue||[]).map(i=>i.library_name).filter(Boolean))],[queue]);

    if(!authed)return <Login onAuth={()=>setAuthed(true)} setup={setup}/>;

    const doAct=async(ep,d)=>{await post(ep,d);rQ();rD();rW();};
    const fileAct=async(id,action)=>{
        if(action==='cancel')await post('/queue/'+id+'/cancel');
        else if(action==='skip')await post('/queue/'+id+'/skip',{reason:'Not needed'});
        else if(action==='accept')await post('/queue/'+id+'/accept');
        else if(action==='requeue')await post('/queue/'+id+'/requeue');
        else if(action==='bump-top')await post('/queue/'+id+'/bump-top');
        else if(action==='bump-up')await post('/queue/'+id+'/bump',{direction:'up'});
        else if(action==='bump-down')await post('/queue/'+id+'/bump',{direction:'down'});
        else if(action==='force-start'){await post('/queue/'+id+'/force-start');toast('Force-started — will process next','success');}
        else if(action==='delete')await del('/queue/'+id);
        rQ();rD();setSelFile(null);
    };
    const saveSt=async()=>{if(lSettings){await put('/settings',lSettings);rS();toast('Settings saved','success')}};

    return <div style={{display:'flex',minHeight:'100vh',background:T.bg,color:T.tx}}>
        {/* SIDEBAR */}
        <nav style={{width:218,background:T.sb,borderRight:`1px solid ${T.bd}`,display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',flexShrink:0}}>
            <div style={{padding:'22px 18px',borderBottom:`1px solid ${T.bd}`}}>
                <div style={{fontSize:24,fontWeight:800,color:T.ac,letterSpacing:'-0.5px',lineHeight:1}}>BYTE</div>
                <div style={{fontSize:10,color:T.t2,letterSpacing:'2.5px',fontWeight:600,marginTop:4}}>TRANSCODE v3.30</div>
            </div>
            <div style={{padding:10,flex:1,overflowY:'auto'}}>
                {/* Main */}
                {[['overview','Dashboard','monitor'],['stats','Stats','zap'],['libraries','Libraries','folder']].map(([id,label,icon])=>{
                    const c=T.ac;const proc=id==='overview'?(s.processing||[]).length:0;
                    return <button key={id} onClick={()=>setTab(id)} style={{display:'flex',alignItems:'center',gap:9,width:'100%',padding:'11px 14px',margin:'2px 0',border:'none',cursor:'pointer',background:tab===id?`${c}18`:'transparent',color:tab===id?c:T.t3,fontSize:14,fontWeight:tab===id?600:400,borderRadius:6,position:'relative'}}>
                        <I n={icon} s={17}/> {label}
                        {id==='overview'&&proc>0&&<span className="mono" style={{marginLeft:'auto',fontSize:10,fontWeight:700,background:`${c}20`,color:c,padding:'2px 8px',borderRadius:10}}>{proc} live</span>}
                    </button>;
                })}
                {/* Tools section header — drag to set job priority (v3.23) */}
                <div style={{display:'flex',alignItems:'center',gap:6,padding:'14px 14px 6px',marginTop:6}}>
                    <span style={{fontSize:9,color:T.t2,fontWeight:700,letterSpacing:'1.5px'}}>TOOLS</span>
                    <span style={{fontSize:8,color:T.t2,opacity:0.7}}>· drag to prioritize</span>
                </div>
                {toolOrder.map((jt,idx)=>{const def=TOOL_DEFS[jt];if(!def)return null;const[label,icon,ck]=def;const c=T[ck]||T.ac;
                    const procCount=(s.processing||[]).filter(p=>(p.job_type||'transcode')===jt).length;
                    const queueCount=gcType(jt,'queued')+gcType(jt,'pending');
                    const active=tab==='dashboard'&&qTypeT===jt;const isDrag=dragTool===jt;
                    return <button key={jt} draggable

                        onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect='move';}}
                        onDrop={e=>{e.preventDefault();reorderTools(jt);}}
                        onDragEnd={()=>setDragTool(null)}
                        onClick={()=>{setTab('dashboard');setQTypeT(jt);setQTab('queued');}}
                        title="Drag to change job priority"
                        style={{display:'flex',alignItems:'center',gap:9,width:'100%',padding:'11px 14px',margin:'2px 0',border:dragTool&&!isDrag?`1px dashed ${T.bd}`:'1px solid transparent',cursor:'grab',background:active?`${c}18`:isDrag?`${c}10`:'transparent',color:active?c:T.t3,fontSize:13,fontWeight:active?600:400,borderRadius:6,position:'relative',opacity:isDrag?0.5:1}}>
                        <span style={{color:T.t2,opacity:0.5,marginLeft:-4,fontSize:11,letterSpacing:'-1px'}}>⋮⋮</span>

            {(()=>{
                const colors={transcode:T.ac,subgen:T.ok,remuxclean:T.in,dv78only:T.a2,compatfix:T.wn};

                const inHC=gcType(qTypeT,'pending');        // pending = awaiting / in health check

                const done=gcType(qTypeT,'complete');
                const skip=gcType(qTypeT,'skipped');         // examined, no work needed
                const err=gcType(qTypeT,'error');
                const total=inHC+ready+proc+done+skip+err;
                const examined=done+skip+err;                 // reached a resting state
                const pct=total>0?Math.round(examined/total*100):0;
                const sp=s.scan_progress||{};
                const scanKey=qTypeT==='transcode'?String(qTypeT):null; // transcode scan uses library keys; others prefixed

                    <span style={{color:w._on?T.ok:w._stale?T.wn:T.t2,fontWeight:600,fontSize:11}}>{w._on?(w.status==='active'?'Active':'Idle'):w._stale?'Stale':'Offline'}</span>
                </div>)}
            </div>}
        </div>}

        {/*═══ LIBRARIES ═══*/}
        {tab==='libraries'&&<div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
                <h1 style={{fontSize:20,fontWeight:700,color:T.t1}}>Libraries</h1>
                <button onClick={()=>doAct('/libraries/scan-all')} style={{background:`${T.ac}18`,border:`1px solid ${T.ac}44`,borderRadius:8,padding:'8px 16px',cursor:'pointer',color:T.ac,fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:5}}><I n="refresh" s={14}/> Scan All</button>
            </div>
            <div style={{background:T.card,borderRadius:10,padding:'16px 20px',marginBottom:18,border:`1px solid ${T.bd}`,display:'flex',gap:12,alignItems:'flex-end'}}>
                <div style={{flex:1}}><label style={{fontSize:11,color:T.t2,display:'block',marginBottom:4}}>Name</label><input value={newLib.name} onChange={e=>setNewLib(l=>({...l,name:e.target.value}))} placeholder="Movies" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:6,padding:'8px 12px',color:T.tx,fontSize:13}}/></div>
                <div style={{flex:2}}><label style={{fontSize:11,color:T.t2,display:'block',marginBottom:4}}>Path</label><input value={newLib.path} onChange={e=>setNewLib(l=>({...l,path:e.target.value}))} placeholder="/media/data/media/movies" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:6,padding:'8px 12px',color:T.tx,fontSize:13}}/></div>
                <button onClick={()=>{if(newLib.name&&newLib.path){doAct('/libraries',newLib);setNewLib({name:'',path:''})}}} style={{background:`${T.ac}18`,border:`1px solid ${T.ac}44`,borderRadius:8,padding:'9px 18px',cursor:'pointer',color:T.ac,fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>+ Add</button>
            </div>
            {(libs||[]).map(lib=>{const sp=s.scan_progress?.[lib.id];const scanning=sp?.status==='scanning';const pct=sp?Math.round(sp.scanned/Math.max(sp.total,1)*100):0;
                const sprc=s.scan_progress?.['remuxclean_'+lib.id];const scanningRC=sprc?.status==='scanning';const pctRC=sprc?Math.round(sprc.scanned/Math.max(sprc.total,1)*100):0;
                const spdv=s.scan_progress?.['dv78only_'+lib.id];const scanningDV=spdv?.status==='scanning';const pctDV=spdv?Math.round(spdv.scanned/Math.max(spdv.total,1)*100):0;
                const spsg=s.scan_progress?.['subgen_'+lib.id];const scanningSG=spsg?.status==='scanning';const pctSG=spsg?Math.round(spsg.scanned/Math.max(spsg.total,1)*100):0;
                const spcf=s.scan_progress?.['compatfix_'+lib.id];const scanningCF=spcf?.status==='scanning';const pctCF=spcf?Math.round(spcf.scanned/Math.max(spcf.total,1)*100):0;
                return <div key={lib.id} style={{borderRadius:10,marginBottom:10,border:`1px solid ${T.bd}`,overflow:'hidden',position:'relative'}}>
                    {scanning&&<div style={{position:'absolute',bottom:0,left:0,height:4,width:`${pct}%`,background:T.ac,transition:'width 0.5s'}}/>}
                    {scanningRC&&<div style={{position:'absolute',bottom:0,left:0,height:4,width:`${pctRC}%`,background:T.in,transition:'width 0.5s'}}/>}
                    {scanningDV&&<div style={{position:'absolute',bottom:0,left:0,height:4,width:`${pctDV}%`,background:T.a2,transition:'width 0.5s'}}/>}
                    {scanningSG&&<div style={{position:'absolute',bottom:0,left:0,height:4,width:`${pctSG}%`,background:T.ok,transition:'width 0.5s'}}/>}
                    {scanningCF&&<div style={{position:'absolute',bottom:0,left:0,height:4,width:`${pctCF}%`,background:T.wn,transition:'width 0.5s'}}/>}
                    <div style={{background:T.card,padding:'16px 20px'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                            <div style={{flex:1}}>
                                <div style={{fontSize:16,fontWeight:600,color:T.t1,marginBottom:3}}>{lib.name}</div>
                                <div className="mono" style={{fontSize:12,color:T.t2}}>{lib.path}</div>
                                {scanning&&<div style={{fontSize:12,color:T.ac,marginTop:5}}>Scanning: {sp.current_file} ({pct}%) · ETA: {sp.eta}</div>}
                                {scanningRC&&<div style={{fontSize:12,color:T.in,marginTop:5}}>Cleanup scan: {sprc.current_file} ({pctRC}%) · ETA: {sprc.eta}</div>}
                                {scanningDV&&<div style={{fontSize:12,color:T.a2,marginTop:5}}>DV7→8 scan: {spdv.current_file} ({pctDV}%) · ETA: {spdv.eta}</div>}
                                {scanningSG&&<div style={{fontSize:12,color:T.ok,marginTop:5}}>SubGen scan: {spsg.current_file} ({pctSG}%) · ETA: {spsg.eta}</div>}
                                {scanningCF&&<div style={{fontSize:12,color:T.wn,marginTop:5}}>Compatibility scan: {spcf.current_file} ({pctCF}%) · ETA: {spcf.eta}</div>}
                                <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
                                    <span style={{fontSize:12,color:T.t3}}>Status: <span style={{color:lib.status==='scanned'?T.ok:T.t3,fontWeight:600}}>{lib.status||'idle'}</span></span>
                                    {lib.last_scanned&&<span style={{fontSize:11,color:T.t2}}>Last scan: {lib.last_scanned}</span>}
                                </div>
                                {/* Library Processing Options */}
                                <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
                                    <button onClick={()=>doAct('/libraries/'+lib.id+'/scan')} disabled={scanning} style={{background:`${T.ok}12`,border:`1px solid ${T.ok}33`,borderRadius:6,padding:'6px 12px',cursor:scanning?'default':'pointer',color:T.ok,fontSize:11,fontWeight:600,opacity:scanning?0.5:1,display:'flex',alignItems:'center',gap:4}}><I n="refresh" s={12}/> Scan (Find New)</button>
                                    <button onClick={async()=>{await post('/queue/clear-library',{library_id:lib.id});await doAct('/libraries/'+lib.id+'/scan');toast('Fresh scan started','info')}} disabled={scanning} style={{background:`${T.ac}12`,border:`1px solid ${T.ac}33`,borderRadius:6,padding:'6px 12px',cursor:'pointer',color:T.ac,fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><I n="refresh" s={12}/> Scan (Fresh)</button>
                                    <button onClick={async()=>{await post('/libraries/'+lib.id+'/scan-remuxclean');toast('Cleanup scan started','info');rL();rD();}} disabled={scanningRC} style={{background:`${T.in}12`,border:`1px solid ${T.in}33`,borderRadius:6,padding:'6px 12px',cursor:scanningRC?'default':'pointer',color:T.in,fontSize:11,fontWeight:600,opacity:scanningRC?0.5:1,display:'flex',alignItems:'center',gap:4}}><I n="search" s={12}/> Scan for Cleanup</button>
                                    <button onClick={async()=>{await post('/libraries/'+lib.id+'/scan-dv78only');toast('DV → P8 scan started','info');rL();rD();}} disabled={scanningDV} style={{background:`${T.a2}12`,border:`1px solid ${T.a2}33`,borderRadius:6,padding:'6px 12px',cursor:scanningDV?'default':'pointer',color:T.a2,fontSize:11,fontWeight:600,opacity:scanningDV?0.5:1,display:'flex',alignItems:'center',gap:4}}><I n="search" s={12}/> Scan for DV → P8</button>
                                    <button onClick={async()=>{await post('/libraries/'+lib.id+'/scan-compat');toast('Compatibility scan started','info');rL();rD();}} disabled={scanningCF} style={{background:`${T.wn}12`,border:`1px solid ${T.wn}33`,borderRadius:6,padding:'6px 12px',cursor:scanningCF?'default':'pointer',color:T.wn,fontSize:11,fontWeight:600,opacity:scanningCF?0.5:1,display:'flex',alignItems:'center',gap:4}}><I n="alert" s={12}/> Scan for Playback Issues</button>
                                    <button onClick={async()=>{await post('/libraries/'+lib.id+'/scan-subgen');toast('SubGen scan started','info');rL();rD();}} disabled={scanningSG} style={{background:`${T.ok}12`,border:`1px solid ${T.ok}33`,borderRadius:6,padding:'6px 12px',cursor:scanningSG?'default':'pointer',color:T.ok,fontSize:11,fontWeight:600,opacity:scanningSG?0.5:1,display:'flex',alignItems:'center',gap:4}}><I n="search" s={12}/> Scan for Japanese Subs</button>
                                    <button onClick={()=>doAct('/libraries/'+lib.id+'/refresh')} style={{background:`${T.in}12`,border:`1px solid ${T.in}33`,borderRadius:6,padding:'6px 12px',cursor:'pointer',color:T.in,fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><I n="refresh" s={12}/> Refresh</button>
                                    <button onClick={async()=>{const r=await post('/queue/requeue-library',{library_id:lib.id});toast('Requeued all items','info');rQ();rD();}} style={{background:`${T.wn}12`,border:`1px solid ${T.wn}33`,borderRadius:6,padding:'6px 12px',cursor:'pointer',color:T.wn,fontSize:11,fontWeight:600}}>Requeue All</button>
                                    <button onClick={async()=>{if(confirm('Clear all queue items for '+lib.name+'?')){await post('/queue/clear-library',{library_id:lib.id});toast('Library queue cleared','info');rQ();rD();}}} style={{background:`${T.er}12`,border:`1px solid ${T.er}33`,borderRadius:6,padding:'6px 12px',cursor:'pointer',color:T.er,fontSize:11,fontWeight:600}}>Clear Library</button>
                                </div>
                            </div>
                            <div style={{display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
                                <div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:600,color:T.tx}}>{lib.file_count||0} <span style={{fontSize:11,fontWeight:400,color:T.t2}}>files</span></div><div style={{fontSize:12,color:T.t2}}>{(lib.total_size_gb||0).toFixed(1)} GB</div></div>
                                <button onClick={()=>{del('/libraries/'+lib.id);rL()}} style={{background:`${T.er}10`,border:`1px solid ${T.er}30`,borderRadius:8,padding:'8px 10px',cursor:'pointer',color:T.er}}><I n="x" s={13}/></button>
                            </div>
                        </div>
                    </div></div>;})}
        </div>}

        {/*═══ SETTINGS ═══*/}
        {tab==='settings'&&lSettings&&<div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
                <h1 style={{fontSize:20,fontWeight:700,color:T.t1}}>Settings</h1>
                <button onClick={saveSt} style={{background:`linear-gradient(135deg,${T.ac},${T.a2})`,border:'none',borderRadius:10,padding:'10px 24px',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>Save Settings</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:18,maxWidth:1400}}>

                {/* SETTINGS SIDE NAV */}
                <div style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:10,padding:8,height:'fit-content',position:'sticky',top:20}}>
                    {[['transcode','Transcode','zap',T.ac],['output','Output','play',T.in],['ai','AI / Subtitles','log',T.ok],['notifications','Notifications','search',T.wn],['appearance','Appearance','settings',T.a2],['api','API Access','key',T.ac]].map(([k,l,ic,c])=>
                        <button key={k} onClick={()=>setSettingsTab(k)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',margin:'2px 0',border:'none',cursor:'pointer',background:settingsTab===k?`${c}18`:'transparent',color:settingsTab===k?c:T.t3,fontSize:13,fontWeight:settingsTab===k?700:500,borderRadius:6,textAlign:'left'}}>
                            <I n={ic} s={15}/> {l}
                        </button>
                    )}
                </div>

                {/* SETTINGS PANEL */}
                <div>

                {/* TRANSCODE */}
                {settingsTab==='transcode'&&<div style={{background:T.card,borderRadius:10,padding:'20px 24px',border:`1px solid ${T.bd}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${T.bd}`}}>
                        <I n="zap" s={18} c={T.ac}/>
                        <h2 style={{fontSize:16,fontWeight:700,color:T.t1}}>Transcode</h2>
                        <span style={{fontSize:12,color:T.t2,marginLeft:'auto'}}>Encoder + quality settings for full transcodes</span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:14}}>
                        <SB T={T} title="Constant Quality (CQ)" desc="Lower = better quality, larger files. 16-20 recommended for 4K.">
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:12,color:T.t3}}>Quality</span><span className="mono" style={{fontSize:15,fontWeight:700,color:T.ac}}>{lSettings.cq}</span></div>
                            <input type="range" min={10} max={30} value={lSettings.cq} onChange={e=>setLS(s=>({...s,cq:e.target.value}))} style={{width:'100%',background:`${T.t2}30`}}/>
                        </SB>
                        <SB T={T} title="NVENC Preset" desc="Slower = better quality at same file size.">
                            <select value={lSettings.preset} onChange={e=>setLS(s=>({...s,preset:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="p7">P7 (Slowest) — best compression</option><option value="slow">Slow — excellent quality</option><option value="medium">Medium — balanced</option><option value="fast">Fast — faster encode</option><option value="p1">P1 (Fastest) — lowest quality</option>
                            </select>
                        </SB>
                        <SB T={T} title="Output Codec">
                            <select value={lSettings.output_codec||'hevc'} onChange={e=>setLS(s=>({...s,output_codec:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="hevc">HEVC (H.265) — recommended</option><option value="h264">H.264 (AVC)</option><option value="av1">AV1</option>
                            </select>
                        </SB>
                        <SB T={T} title="Hardware Encoder">
                            <select value={lSettings.hw_encoder||'nvenc'} onChange={e=>setLS(s=>({...s,hw_encoder:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="nvenc">NVENC (NVIDIA)</option><option value="qsv">QSV (Intel)</option><option value="vaapi">VAAPI (Linux)</option><option value="software">Software (x265)</option>
                            </select>
                        </SB>
                        <SB T={T} title="Hardware Decoding" desc="Use GPU to decode source file.">
                            <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={(lSettings.hw_decode||'true')==='true'} onTog={()=>setLS(s=>({...s,hw_decode:s.hw_decode==='true'?'false':'true'}))} T={T}/><span style={{fontSize:14,color:T.tx}}>{(lSettings.hw_decode||'true')==='true'?'Enabled':'Disabled'}</span></label>
                        </SB>
                        <SB T={T} title="Max Workers">
                            <input type="range" min={0} max={6} value={lSettings.max_workers} onChange={e=>setLS(s=>({...s,max_workers:e.target.value}))} style={{width:'100%',background:`${T.t2}30`}}/>
                            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginTop:4}}><span style={{color:T.t2}}>0 = paused</span><span className="mono" style={{color:T.ac,fontWeight:700}}>{lSettings.max_workers}</span></div>
                        </SB>
                        <SB T={T} title="Min File Size (GB)">
                            <input type="range" min={0} max={50} value={lSettings.min_size_gb} onChange={e=>setLS(s=>({...s,min_size_gb:e.target.value}))} style={{width:'100%',background:`${T.t2}30`}}/>
                            <span className="mono" style={{fontSize:13,color:T.ac,fontWeight:700}}>{lSettings.min_size_gb} GB</span>
                        </SB>
                    </div>
                </div>}

                {/* OUTPUT */}
                {settingsTab==='output'&&<div style={{background:T.card,borderRadius:10,padding:'20px 24px',border:`1px solid ${T.bd}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${T.bd}`}}>
                        <I n="play" s={18} c={T.in}/>
                        <h2 style={{fontSize:16,fontWeight:700,color:T.t1}}>Output</h2>
                        <span style={{fontSize:12,color:T.t2,marginLeft:'auto'}}>How processed files are saved and named</span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:14}}>
                        <SB T={T} title="Container">
                            <select value={lSettings.container} onChange={e=>setLS(s=>({...s,container:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}><option value="mkv">MKV (recommended)</option><option value="mp4">MP4</option></select>
                        </SB>
                        <SB T={T} title="DoVi → P8" desc="Convert any Dolby Vision profile (5, 7, ...) to Profile 8 during transcode.">
                            <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={lSettings.dovi_convert_p8==='true'} onTog={()=>setLS(s=>({...s,dovi_convert_p8:s.dovi_convert_p8==='true'?'false':'true'}))} T={T}/><span style={{fontSize:14,color:T.tx}}>{lSettings.dovi_convert_p8==='true'?'Enabled':'Disabled'}</span></label>
                        </SB>
                        <SB T={T} title="Keep Languages" desc="Audio/subtitle languages kept by Audio Cleanup and Compatibility filtering (comma-separated ISO codes, e.g. eng,jpn or eng,spa,fre). Untagged tracks are always kept.">
                            <input className="mono" value={lSettings.keep_langs||'eng,jpn'} onChange={e=>setLS(s=>({...s,keep_langs:e.target.value}))} placeholder="eng,jpn" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Compatibility Target Codec" desc="Codec used when the Compatibility pipeline re-encodes a flagged file. H.264 plays on everything; HEVC is smaller but needs a modern device.">
                            <select value={lSettings.compat_target||'h264'} onChange={e=>setLS(s=>({...s,compat_target:e.target.value}))} style={{background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13,cursor:'pointer'}}>
                                <option value="h264">H.264 (most compatible)</option>
                                <option value="hevc">HEVC (smaller files)</option>
                            </select>
                        </SB>
                        <SB T={T} title="Replace Original" desc="Overwrite source file once processing completes.">
                            <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={lSettings.replace_original==='true'} onTog={()=>setLS(s=>({...s,replace_original:s.replace_original==='true'?'false':'true'}))} T={T}/><span style={{fontSize:14,color:T.tx}}>{lSettings.replace_original==='true'?'Replace originals':'Keep both'}</span></label>
                        </SB>
                        <SB T={T} title="Auto-Accept" desc="Skip the manual review step on completed transcodes.">
                            <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={lSettings.auto_accept==='true'} onTog={()=>setLS(s=>({...s,auto_accept:s.auto_accept==='true'?'false':'true'}))} T={T}/><span style={{fontSize:14,color:T.tx}}>{lSettings.auto_accept==='true'?'Enabled':'Manual review'}</span></label>
                        </SB>
                        <SB T={T} title="Skip Transcoded" desc="Don't re-encode files already in the chosen codec.">
                            <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={lSettings.skip_transcoded==='true'} onTog={()=>setLS(s=>({...s,skip_transcoded:s.skip_transcoded==='true'?'false':'true'}))} T={T}/><span style={{fontSize:14,color:T.tx}}>{lSettings.skip_transcoded==='true'?'Skip NVENC files':'Re-encode all'}</span></label>
                        </SB>
                        <SB T={T} title="Path Mapping — Server Prefix" desc="Server's view of media root (e.g. /media/ for Docker bind mount).">
                            <input type="text" value={lSettings.node_path_remote_prefix||'/media/'} onChange={e=>setLS(s=>({...s,node_path_remote_prefix:e.target.value}))} className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Path Mapping — Node Prefix" desc="What the node sees instead (e.g. Z:\\ for Windows SMB share). Empty = no translation.">
                            <input type="text" value={lSettings.node_path_local_prefix||''} onChange={e=>setLS(s=>({...s,node_path_local_prefix:e.target.value}))} placeholder="Z:\\" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Node Temp Directory" desc="Where the node writes intermediate files (HEVC dumps, audio extracts, SRTs). Use a fast local SSD. Default: F:\\Byte_Engine_temp on Windows.">
                            <input type="text" value={lSettings.node_temp_path||''} onChange={e=>setLS(s=>({...s,node_temp_path:e.target.value}))} placeholder="F:\\Byte_Engine_temp" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                    </div>
                </div>}

                {/* AI / SUBTITLES */}
                {settingsTab==='ai'&&<div style={{background:T.card,borderRadius:10,padding:'20px 24px',border:`1px solid ${T.bd}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${T.bd}`}}>
                        <I n="log" s={18} c={T.ok}/>
                        <h2 style={{fontSize:16,fontWeight:700,color:T.t1}}>AI / Subtitle Generation</h2>
                        <span style={{fontSize:12,color:T.t2,marginLeft:'auto'}}>Whisper transcription + multi-provider AI translation</span>
                    </div>
                    {(()=>{const pv=lSettings.translate_provider||'anthropic';const eff=(lSettings.translate_api_key||'')||(pv==='anthropic'?(lSettings.claude_api_key||''):'');return (pv!=='openai_compatible'&&!eff)?<div style={{padding:'10px 14px',background:`${T.wn}15`,border:`1px solid ${T.wn}44`,borderRadius:8,marginBottom:14,fontSize:12,color:T.wn,display:'flex',gap:8,alignItems:'center'}}><I n="search" s={14}/> No API key set for the selected provider ({pv}) — SubGen translation jobs will fail until you add one below.</div>:null;})()}
                    {/* v3.24 — OpenSubtitles: official English subs first (seconds, synced), Whisper only as fallback */}
                    <div style={{background:`${T.ok}0c`,border:`1px solid ${T.ok}33`,borderRadius:10,padding:'14px 16px',marginBottom:16}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                            <I n="download" s={15} c={T.ok}/><span style={{fontSize:13,fontWeight:700,color:T.t1}}>Official Subtitle Source — OpenSubtitles</span>
                        </div>
                        <div style={{fontSize:11.5,color:T.t2,marginBottom:12,lineHeight:1.5}}>When set, SubGen fetches official English subs from opensubtitles.com in seconds (accurate + synced) and only falls back to Whisper if none exist. Get a free key at opensubtitles.com → Consumers, and use your normal login for downloads. Free tier allows a limited number of downloads/day.</div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(230px,1fr))',gap:12}}>
                            <SB T={T} title="OpenSubtitles API Key" desc="opensubtitles.com → account → Consumers → New Consumer.">
                                <input type="password" value={lSettings.opensubtitles_api_key||''} onChange={e=>setLS(s=>({...s,opensubtitles_api_key:e.target.value}))} placeholder="API key" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                            </SB>
                            <SB T={T} title="OpenSubtitles Username" desc="Your opensubtitles.com login (needed to download).">
                                <input type="text" value={lSettings.opensubtitles_username||''} onChange={e=>setLS(s=>({...s,opensubtitles_username:e.target.value}))} placeholder="username" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                            </SB>
                            <SB T={T} title="OpenSubtitles Password" desc="Stored to fetch a download token.">
                                <input type="password" value={lSettings.opensubtitles_password||''} onChange={e=>setLS(s=>({...s,opensubtitles_password:e.target.value}))} placeholder="password" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                            </SB>
                        </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:14}}>
                        <SB T={T} title="Translation Provider" desc="Pick any AI service. 'OpenAI-compatible' + Base URL covers local Ollama/LM Studio and OpenRouter/DeepSeek/etc.">
                            <select value={lSettings.translate_provider||'gemini'} onChange={e=>setLS(s=>({...s,translate_provider:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="anthropic">Anthropic (Claude)</option>
                                <option value="openai">OpenAI</option>
                                <option value="gemini">Google (Gemini)</option>
                                <option value="openai_compatible">OpenAI-compatible / Local (Ollama, LM Studio, OpenRouter…)</option>
                            </select>
                        </SB>
                        <SB T={T} title="Translation API Key(s)" desc="Key for the selected provider. Add MULTIPLE keys separated by commas to rotate automatically when one hits its daily quota. Local servers (Ollama/LM Studio) can leave blank.">
                            <input type="text" value={lSettings.translate_api_key||''} onChange={e=>setLS(s=>({...s,translate_api_key:e.target.value}))} placeholder="key1, key2, key3 …" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Min Seconds Between Calls" desc="Pace requests to stay under a free tier's per-minute limit. Gemini free ≈ 15/min → use 4-5. 0 = no pacing.">
                            <input type="number" min={0} max={60} value={lSettings.translate_min_interval||'0'} onChange={e=>setLS(s=>({...s,translate_min_interval:e.target.value}))} className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Translation Model" desc="Model id for the provider (e.g. gpt-4o-mini, gemini-2.5-flash, qwen2.5:32b). Blank uses the Anthropic legacy model below.">
                            <input type="text" value={lSettings.translate_model||''} onChange={e=>setLS(s=>({...s,translate_model:e.target.value}))} placeholder="e.g. gemini-2.5-flash" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Translation Base URL" desc="Required for OpenAI-compatible / local (e.g. http://192.168.3.68:11434/v1). Optional override for others.">
                            <input type="text" value={lSettings.translate_base_url||''} onChange={e=>setLS(s=>({...s,translate_base_url:e.target.value}))} placeholder="http://localhost:11434/v1" className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Claude API Key" desc="Legacy / Anthropic fallback — used when provider is Anthropic and no Translation API Key is set.">
                            <input type="password" value={lSettings.claude_api_key||''} onChange={e=>setLS(s=>({...s,claude_api_key:e.target.value}))} placeholder="sk-ant-api03-..." className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Claude Model" desc="Recommended: claude-sonnet-4-6.">
                            <select value={lSettings.claude_model||'claude-sonnet-4-6'} onChange={e=>setLS(s=>({...s,claude_model:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="claude-sonnet-4-6">claude-sonnet-4-6 (recommended)</option>
                                <option value="claude-opus-4-7">claude-opus-4-7 (highest quality)</option>
                                <option value="claude-opus-4-6">claude-opus-4-6 (high quality)</option>
                                <option value="claude-sonnet-4-5">claude-sonnet-4-5 (legacy)</option>
                                <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 (fastest, cheapest)</option>
                            </select>
                        </SB>
                        <SB T={T} title="Whisper Model" desc="large-v3 = best Japanese accuracy.">
                            <select value={lSettings.whisper_model||'large-v3'} onChange={e=>setLS(s=>({...s,whisper_model:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="large-v3">large-v3 (best accuracy)</option>
                                <option value="medium">medium (balanced)</option>
                                <option value="small">small (fast)</option>
                                <option value="base">base (fastest)</option>
                            </select>
                        </SB>
                        <SB T={T} title="Whisper Device" desc="auto picks CUDA if available. RTX 5080 → CUDA recommended.">
                            <select value={lSettings.whisper_device||'auto'} onChange={e=>setLS(s=>({...s,whisper_device:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="auto">auto (CUDA → fall back to CPU)</option>
                                <option value="cuda">cuda (NVIDIA GPU)</option>
                                <option value="cpu">cpu (slower, more RAM)</option>
                            </select>
                        </SB>
                        <SB T={T} title="Translation Chunk Size" desc="SRT entries per API call. 40 is a safe default.">
                            <input type="number" min={10} max={100} value={lSettings.subgen_translate_chunk||'40'} onChange={e=>setLS(s=>({...s,subgen_translate_chunk:e.target.value}))} className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Subtitle Output" desc="Embed new tracks into the file (mkvmerge) or write external .srt beside it. 'auto' embeds small files, external for big ones.">
                            <select value={lSettings.subgen_embed||'auto'} onChange={e=>setLS(s=>({...s,subgen_embed:e.target.value}))} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="auto">auto (embed small, external for big)</option>
                                <option value="always">always embed (mkvmerge remux)</option>
                                <option value="never">always external .srt</option>
                            </select>
                        </SB>
                        <SB T={T} title="Embed Size Limit (GB)" desc="In 'auto' mode: files at or below this size get embedded; larger files get external SRTs (remux would be slow).">
                            <input type="number" min={1} max={200} value={lSettings.subgen_embed_max_gb||'25'} onChange={e=>setLS(s=>({...s,subgen_embed_max_gb:e.target.value}))} className="mono" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </SB>
                        <SB T={T} title="Glossary / Context (optional)" desc="Recurring names, terms, honorifics or show context to keep translations consistent. Applied to every chunk.">
                            <textarea value={lSettings.translate_glossary||''} onChange={e=>setLS(s=>({...s,translate_glossary:e.target.value}))} rows={4} placeholder={"e.g. Show: The Sopranos. Tony→トニー, Carmela→カーメラ. Keep mob slang and profanity."} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:13,fontFamily:'inherit',resize:'vertical'}}/>
                        </SB>
                    </div>
                </div>}

                {/* NOTIFICATIONS */}
                {settingsTab==='notifications'&&<div style={{background:T.card,borderRadius:10,padding:'20px 24px',border:`1px solid ${T.bd}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${T.bd}`}}>
                        <I n="search" s={18} c={T.wn}/>
                        <h2 style={{fontSize:16,fontWeight:700,color:T.t1}}>Notifications</h2>
                        <span style={{fontSize:12,color:T.t2,marginLeft:'auto'}}>ntfy.sh push alerts</span>
                    </div>
                    <SB T={T} title="ntfy.sh Notifications" desc="Get push notifications when jobs complete or fail. Free service at ntfy.sh — enter your topic URL.">
                        <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',marginBottom:10}}>
                            <Tog on={(lSettings.ntfy_enabled||'false')==='true'} onTog={()=>setLS(s=>({...s,ntfy_enabled:s.ntfy_enabled==='true'?'false':'true'}))} T={T}/>
                            <span style={{fontSize:14,color:T.tx}}>{(lSettings.ntfy_enabled||'false')==='true'?'Enabled':'Disabled'}</span>
                        </label>
                        <div style={{marginBottom:8}}>
                            <label style={{fontSize:11,color:T.t2,display:'block',marginBottom:4}}>ntfy Topic URL</label>
                            <input value={lSettings.ntfy_url||''} onChange={e=>setLS(s=>({...s,ntfy_url:e.target.value}))} placeholder="https://ntfy.sh/byte-transcode-alerts" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:6,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                        </div>
                        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                            <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:T.t3,cursor:'pointer'}}><input type="checkbox" checked={(lSettings.ntfy_on_complete||'true')==='true'} onChange={e=>setLS(s=>({...s,ntfy_on_complete:e.target.checked?'true':'false'}))} style={{accentColor:T.ac}}/> Job Complete</label>
                            <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:T.t3,cursor:'pointer'}}><input type="checkbox" checked={(lSettings.ntfy_on_error||'true')==='true'} onChange={e=>setLS(s=>({...s,ntfy_on_error:e.target.checked?'true':'false'}))} style={{accentColor:T.ac}}/> Job Error</label>
                            <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:T.t3,cursor:'pointer'}}><input type="checkbox" checked={(lSettings.ntfy_on_scan||'false')==='true'} onChange={e=>setLS(s=>({...s,ntfy_on_scan:e.target.checked?'true':'false'}))} style={{accentColor:T.ac}}/> Scan Complete</label>
                        </div>
                        {lSettings.ntfy_url&&<button onClick={async()=>{try{await fetch(lSettings.ntfy_url,{method:'POST',body:'Byte Transcode test notification!'});toast('Test sent!','success')}catch(e){toast('Failed: '+e.message,'error')}}} style={{marginTop:10,background:`${T.in}15`,border:`1px solid ${T.in}44`,borderRadius:6,padding:'6px 14px',cursor:'pointer',color:T.in,fontSize:12,fontWeight:600}}>Send Test</button>}
                    </SB>
                </div>}

                {/* APPEARANCE */}
                {settingsTab==='appearance'&&<div style={{background:T.card,borderRadius:10,padding:'20px 24px',border:`1px solid ${T.bd}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${T.bd}`}}>
                        <I n="settings" s={18} c={T.a2}/>
                        <h2 style={{fontSize:16,fontWeight:700,color:T.t1}}>Appearance</h2>
                        <span style={{fontSize:12,color:T.t2,marginLeft:'auto'}}>UI theme</span>
                    </div>
                    <SB T={T} title="Theme">
                        <div style={{display:'flex',gap:10}}>{Object.entries(TH).map(([k,t])=><button key={k} onClick={()=>{setTheme(k);setLS(s=>({...s,theme:k}))}} style={{flex:1,padding:14,borderRadius:8,border:theme===k?`2px solid ${t.ac}`:`1px solid ${t.bd}`,background:t.bg,cursor:'pointer',textAlign:'center'}}><div style={{width:22,height:22,borderRadius:11,background:t.ac,margin:'0 auto 8px'}}/><div style={{fontSize:12,fontWeight:600,color:t.t1,textTransform:'capitalize'}}>{k}</div></button>)}</div>
                    </SB>
                </div>}

                {/* API ACCESS */}
                {settingsTab==='api'&&<div style={{background:T.card,borderRadius:10,padding:'20px 24px',border:`1px solid ${T.bd}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${T.bd}`}}>
                        <I n="key" s={18} c={T.ac}/>
                        <h2 style={{fontSize:16,fontWeight:700,color:T.t1}}>API Access</h2>
                        <span style={{fontSize:12,color:T.t2,marginLeft:'auto'}}>For programmatic access to this server</span>
                    </div>
                    <SB T={T} title="API Key" desc="Generate a key for external scripts to authenticate with the server.">
                        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                            <button onClick={()=>{let k='';try{k=crypto.randomUUID();}catch(e){k=Array.from({length:32},()=>Math.random().toString(36)[2]).join('');}setLS(s=>({...s,api_key:k}));toast('Key generated — save to persist','info')}} style={{background:`${T.ac}18`,border:`1px solid ${T.ac}44`,borderRadius:8,padding:'8px 16px',cursor:'pointer',color:T.ac,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><I n="key" s={13}/> Generate</button>
                            {lSettings.api_key&&<><code className="mono" style={{fontSize:11,color:T.t3,background:T.bg,padding:'6px 10px',borderRadius:6,border:`1px solid ${T.bd}`,wordBreak:'break-all',flex:1}}>{lSettings.api_key}</code>
                                <button onClick={()=>{copyText(lSettings.api_key);toast('Copied!','success')}} style={{background:`${T.ok}15`,border:`1px solid ${T.ok}44`,borderRadius:8,padding:'7px 12px',cursor:'pointer',color:T.ok,fontSize:11,fontWeight:600}}><I n="copy" s={12}/></button></>}
                        </div>
                    </SB>
                </div>}

                <button onClick={saveSt} style={{background:`linear-gradient(135deg,${T.ac},${T.a2})`,border:'none',borderRadius:10,padding:'13px',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',width:'100%',marginTop:14}}>Save Settings</button>

                </div>{/* /SETTINGS PANEL */}
            </div>
        </div>}

        {/*═══ LOGS ═══*/}
        {tab==='logs'&&<div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
                <h1 style={{fontSize:20,fontWeight:700,color:T.t1}}>System Logs</h1>
                <div style={{display:'flex',gap:8}}>
                    <a href="/api/logs/download" style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:8,padding:'8px 14px',color:T.t3,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4,textDecoration:'none'}}><I n="download" s={13}/> Download</a>
                    <button onClick={rLg} style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:8,padding:'8px 14px',cursor:'pointer',color:T.t3,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><I n="refresh" s={13}/> Refresh</button>
                </div></div>
            <div className="mono" style={{background:'#08090c',borderRadius:10,padding:16,fontSize:12,lineHeight:'19px',maxHeight:'75vh',overflowY:'auto',border:`1px solid ${T.bd}`}}>
                {(logs||[]).map(l=><div key={l.id} style={{color:l.level==='ERROR'?T.er:l.level==='WARN'?T.wn:T.t2,marginBottom:2}}>
                    <span style={{opacity:0.5}}>{l.timestamp}</span>{' '}<span style={{color:l.level==='ERROR'?T.er:l.level==='WARN'?T.wn:T.in,fontWeight:600}}>[{l.level}]</span>{' '}<span style={{opacity:0.6}}>[{l.source}]</span>{' '}{l.message}
                </div>)}
                {(!logs||logs.length===0)&&<div style={{color:T.t2}}>No logs yet.</div>}
            </div>
        </div>}

        </main>
        {selFile&&<FileModal item={selFile} T={T} onClose={()=>setSelFile(null)} onAct={fileAct}/>}
    </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Toasts><App/></Toasts></ErrorBoundary>);
</script>
</body>
</html>
