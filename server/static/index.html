/*═══ API ═══*/
function copyText(txt){try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt)}else{const t=document.createElement('textarea');t.value=txt;t.style.cssText='position:fixed;left:-9999px';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)}}catch(e){}}

/* Format timestamps — server Docker stores UTC, convert to browser local time */
function fmtTime(ts, mode='short'){
    if(!ts) return '--';
    try{
        // Server container has no TZ set, so datetime('now','localtime') = UTC
        // Append 'Z' to parse as UTC, toLocaleString converts to browser local
        let d;
        if(ts.includes('T')&&ts.includes('Z')){d=new Date(ts);}
        else if(ts.includes('T')){d=new Date(ts+'Z');}
        else{d=new Date(ts.replace(' ','T')+'Z');}
        if(isNaN(d.getTime())) return ts;
        if(mode==='full') return d.toLocaleString();
        if(mode==='time') return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        if(mode==='date') return d.toLocaleDateString([],{month:'short',day:'numeric'});
        return d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    }catch(e){return ts;}
}

function useApi(ep,ms){const[d,setD]=useState(null);const f=useCallback(()=>{if(!ep)return;fetch('/api'+ep,{credentials:'include'}).then(r=>r.ok?r.json():null).then(setD).catch(()=>{});},[ep]);useEffect(()=>{if(!ep)return;f();if(ms){const iv=setInterval(f,ms);return()=>clearInterval(iv)}},[f,ms,ep]);return{data:d,refresh:f};}
const post=(ep,body)=>fetch('/api'+ep,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body||{})}).then(r=>r.json()).catch(()=>null);
const put=(ep,body)=>fetch('/api'+ep,{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body||{})}).then(r=>r.json()).catch(()=>null);
const del=(ep)=>fetch('/api'+ep,{method:'DELETE',credentials:'include'}).then(r=>r.json()).catch(()=>null);

/*═══ TOAST ═══*/
const TC=createContext();
function Toasts({children}){
    const[ts,set]=useState([]);
    const add=useCallback((m,t='info')=>{const id=Date.now();set(p=>[...p,{id,m,t}]);setTimeout(()=>set(p=>p.filter(x=>x.id!==id)),3500);},[]);
    return <TC.Provider value={add}>{children}
        <div style={{position:'fixed',bottom:20,right:20,zIndex:999,display:'flex',flexDirection:'column',gap:8}}>
            {ts.map(t=>{const c=t.t==='success'?'#66BB6A':t.t==='error'?'#EF5350':'#29B6F6';
                return <div key={t.id} style={{padding:'10px 18px',borderRadius:8,background:`${c}22`,border:`1px solid ${c}`,color:c,fontSize:13,fontWeight:600,animation:'fadeIn 0.2s'}}>{t.m}</div>})}
        </div></TC.Provider>;
}

/*═══ ERROR BOUNDARY ═══*/
class ErrorBoundary extends React.Component{
    constructor(props){super(props);this.state={error:null,info:null};}
    static getDerivedStateFromError(error){return{error};}
    componentDidCatch(error,info){this.setState({info});console.error('React Error:',error,info);}
    render(){
        if(this.state.error){
            return React.createElement('div',{style:{padding:40,background:'#0A0E14',color:'#EF5350',minHeight:'100vh',fontFamily:'monospace'}},
                React.createElement('h1',{style:{marginBottom:20,color:'#E040FB'}},'Byte Transcode — Render Error'),
                React.createElement('pre',{style:{background:'#12161e',padding:20,borderRadius:8,overflow:'auto',fontSize:13,lineHeight:1.6,color:'#CFD8DC'}},
                    this.state.error.toString()+'\n\n'+(this.state.info?.componentStack||'')),
                React.createElement('button',{onClick:()=>window.location.reload(),style:{marginTop:20,padding:'10px 20px',background:'#E040FB',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:14}},'Reload')
            );
        }
        return this.props.children;
    }
}

/*═══ LIVE CLOCK ═══*/
function Clock(){const[t,setT]=useState(new Date());useEffect(()=>{const iv=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(iv);},[]);return t.toLocaleTimeString();}

/*═══ LOGIN ═══*/
function Login({onAuth,setup}){
    const[u,setU]=useState('');const[p,setP]=useState('');const[e,setE]=useState('');
    const go=async()=>{if(!u||!p){setE('Username and password required');return;}const r=await post(setup?'/auth/setup':'/auth/login',{username:u,password:p});if(r?.ok)onAuth();else setE(r?.error||'Failed');};
    const T=TH.dark;
    return <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{background:T.sb,borderRadius:14,padding:'44px 40px',border:`1px solid ${T.bd}`,width:380,textAlign:'center'}}>
            <div className="grad-text" style={{fontSize:32,fontWeight:800,background:`linear-gradient(135deg,${T.ac},${T.a2})`,marginBottom:4}}>BYTE</div>
            <div style={{fontSize:11,color:T.t2,letterSpacing:'3px',fontWeight:600,marginBottom:36}}>TRANSCODE v3</div>
            {setup&&<div style={{fontSize:13,color:T.ac,marginBottom:16,padding:'10px 14px',background:`${T.ac}15`,borderRadius:8}}>First time — create your admin account</div>}
            {e&&<div style={{fontSize:13,color:T.er,marginBottom:14}}>{e}</div>}
            <input value={u} onChange={ev=>setU(ev.target.value)} placeholder="Username" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14,marginBottom:12}}/>
            <input value={p} onChange={ev=>setP(ev.target.value)} onKeyDown={ev=>ev.key==='Enter'&&go()} type="password" placeholder="Password" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14,marginBottom:18}}/>
            <button onClick={go} style={{width:'100%',background:`linear-gradient(135deg,${T.ac},${T.a2})`,border:'none',borderRadius:10,padding:'13px',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer'}}>{setup?'Create Account':'Login'}</button>
        </div></div>;
}

/*═══ SETTING BOX ═══*/
function SB({title,desc,children,T}){return <div style={{background:T.card,borderRadius:10,padding:'18px 22px',border:`1px solid ${T.bd}`,marginBottom:14}}>

    {children}</div>;}

/*═══ LIVE LOG VIEWER — Tdarr-style rich output ═══*/
function LiveLog({logs=[],T,isLive=false,jobId=null}){
    const endRef=useRef();const containerRef=useRef();
    const[autoScroll,setAutoScroll]=useState(true);
    const[filter,setFilter]=useState('all'); // all, steps, ffmpeg, errors
    const[search,setSearch]=useState('');
    const[collapsed,setCollapsed]=useState({}); // step index -> collapsed

    // Auto-scroll when new logs arrive
    useEffect(()=>{if(autoScroll&&endRef.current){endRef.current.scrollIntoView({behavior:'smooth'})}},[logs.length,autoScroll]);

    // Detect manual scroll to disable auto-scroll
    const handleScroll=useCallback(()=>{
        if(!containerRef.current)return;
        const{scrollTop,scrollHeight,clientHeight}=containerRef.current;
        setAutoScroll(scrollHeight-scrollTop-clientHeight<80);
    },[]);

    // Categorize log lines
    const categorized=useMemo(()=>{
        return logs.map((l,i)=>{
            const msg=l.message||'';
            let cat='info';
            if(msg.match(/^\[Step \d+/))cat='step';
            else if(msg.startsWith('[CMD'))cat='cmd';
            else if(msg.startsWith('[FFMPEG]'))cat='ffmpeg';
            else if(msg.startsWith('[OK]'))cat='ok';
            else if(l.level==='ERROR'||msg.startsWith('[ERROR]'))cat='error';
            else if(l.level==='WARN'||msg.startsWith('[WARN]'))cat='warn';
            else if(msg.includes('COMPLETE')||msg.includes('═══'))cat='result';
            return{...l,idx:i,cat};
        });
    },[logs]);

    // Apply filter
    const filtered=useMemo(()=>{
        let f=categorized;
        if(filter==='steps')f=f.filter(l=>['step','ok','error','result','cmd'].includes(l.cat));
        else if(filter==='ffmpeg')f=f.filter(l=>l.cat==='ffmpeg'||l.cat==='step'||l.cat==='result');
        else if(filter==='errors')f=f.filter(l=>l.cat==='error'||l.cat==='warn');
        if(search){const s=search.toLowerCase();f=f.filter(l=>(l.message||'').toLowerCase().includes(s));}
        return f;
    },[categorized,filter,search]);

    const getColor=(l)=>{
        if(l.cat==='error')return T.er;
        if(l.cat==='warn')return T.wn;
        if(l.cat==='step')return T.ac;
        if(l.cat==='cmd')return T.a2;
        if(l.cat==='ok')return T.ok;
        if(l.cat==='result')return T.ok;
        if(l.cat==='ffmpeg')return T.in;
        return T.t2;
    };

    const lineCount=filtered.length;
    const stepCount=categorized.filter(l=>l.cat==='step').length;
    const errCount=categorized.filter(l=>l.cat==='error').length;

    return <div style={{borderRadius:8,border:`1px solid ${T.bd}`,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {/* Toolbar */}
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 12px',borderBottom:`1px solid ${T.bd}`,background:T.cs,flexWrap:'wrap'}}>
            <div style={{display:'flex',gap:3}}>
                {[['all','All',T.t3,lineCount],['steps','Steps',T.ac,stepCount],['ffmpeg','FFmpeg',T.in,categorized.filter(l=>l.cat==='ffmpeg').length],['errors','Errors',T.er,errCount]].map(([k,l,c,n])=>
                    <button key={k} onClick={()=>setFilter(k)} style={{padding:'3px 10px',borderRadius:4,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,background:filter===k?`${c}22`:T.card,color:filter===k?c:T.t2}}>{l}{n>0&&<span className="mono" style={{marginLeft:4,fontSize:10,opacity:0.7}}>{n}</span>}</button>)}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:4,background:T.bg,borderRadius:4,padding:'3px 8px',border:`1px solid ${T.bd}`,flex:1,minWidth:100,maxWidth:200}}>
                <I n="search" s={11} c={T.t2}/>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filter logs..." style={{background:'none',border:'none',outline:'none',color:T.tx,fontSize:11,width:'100%'}}/>
            </div>
            {isLive&&<div style={{display:'flex',alignItems:'center',gap:4,marginLeft:'auto'}}>
                <div style={{width:7,height:7,borderRadius:4,background:T.er,animation:'pulse 1.5s ease-in-out infinite'}}/>
                <span style={{fontSize:11,fontWeight:600,color:T.er}}>LIVE</span>
            </div>}
            <button onClick={()=>setAutoScroll(true)} style={{background:autoScroll?`${T.ok}15`:T.card,border:`1px solid ${autoScroll?T.ok+'44':T.bd}`,borderRadius:4,padding:'3px 8px',cursor:'pointer',color:autoScroll?T.ok:T.t2,fontSize:11,fontWeight:600,marginLeft:isLive?0:'auto'}}>Auto-scroll {autoScroll?'ON':'OFF'}</button>
            <span className="mono" style={{fontSize:11,color:T.t2}}>{filtered.length} lines</span>
        </div>
        {/* Log output */}
        <div ref={containerRef} onScroll={handleScroll} className="mono" style={{background:'#08090c',padding:8,fontSize:12,lineHeight:'19px',maxHeight:450,minHeight:200,overflowY:'auto'}}>
            {filtered.map((l,i)=>{
                const color=getColor(l);
                const isStep=l.cat==='step';
                const isResult=l.cat==='result';
                const isSeparator=(l.message||'').includes('═══');
                return <div key={l.idx||i} style={{display:'flex',gap:6,marginBottom:isStep?4:0,marginTop:isStep&&i>0?6:0,padding:isStep?'4px 6px':'1px 6px',background:isStep?`${T.ac}08`:isResult&&!isSeparator?`${T.ok}06`:'transparent',borderRadius:isStep?4:0,borderLeft:isStep?`3px solid ${T.ac}`:l.cat==='error'?`3px solid ${T.er}`:'3px solid transparent'}}>

                    </div>;
            })}
            {filtered.length===0&&<div style={{padding:20,textAlign:'center',color:T.t2}}>
                {logs.length===0?(isLive?'Waiting for log output...':'No log entries'):'No matches for current filter'}
            </div>}
            <div ref={endRef}/>
        </div>
    </div>;
}

function FileModal({item,T,onClose,onAct}){
    const[tab,setTab]=useState(item._tab||'info');
    const[logs,setLogs]=useState([]);
    const[isLive,setIsLive]=useState(false);
    const iv=useRef();const esRef=useRef();const toast=useContext(TC);

    // Fetch initial logs from DB
    const getLogs=useCallback(()=>{fetch(`/api/logs?job_id=${item.id}&limit=200`,{credentials:'include'}).then(r=>r.ok?r.json():[]).then(d=>setLogs(Array.isArray(d)?d.reverse():[])).catch(()=>{});},[item.id]);

    // SSE for live streaming when processing
    useEffect(()=>{
        getLogs();
        if(item.status==='processing'){
            setIsLive(true);
            // Use SSE for live streaming
            try{
                const es=new EventSource(`/api/jobs/${item.id}/log-stream`);
                esRef.current=es;
                es.onmessage=(e)=>{
                    try{
                        const entry=JSON.parse(e.data);
                        if(entry.type==='done'){setIsLive(false);es.close();return;}
                        setLogs(prev=>{
                            // Deduplicate by checking last message
                            if(prev.length>0&&prev[prev.length-1].message===entry.message&&prev[prev.length-1].timestamp===entry.timestamp)return prev;
                            return[...prev,entry];
                        });
                    }catch(err){}
                };
                es.onerror=()=>{
                    // Fallback to polling if SSE fails
                    setIsLive(false);
                    es.close();
                    iv.current=setInterval(getLogs,2000);
                };
            }catch(e){
                // SSE not supported, fall back to polling
                iv.current=setInterval(getLogs,2000);
            }
        }else if(['queued','pending'].includes(item.status)){
            // Poll slowly for health check logs
            iv.current=setInterval(getLogs,5000);
        }
        return()=>{clearInterval(iv.current);if(esRef.current)esRef.current.close();};
    },[item.id,item.status,getLogs]);

            <div style={{display:'flex',borderBottom:`1px solid ${T.bd}`}}>
                {[['info','Details'],['log','Report']].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{padding:'12px 20px',border:'none',borderBottom:tab===k?`2px solid ${T.ac}`:'2px solid transparent',background:'none',color:tab===k?T.ac:T.t3,fontSize:14,fontWeight:600,cursor:'pointer'}}>{l}</button>)}

    const{data:dash,refresh:rD}=useApi('/dashboard',5000);

    const{data:allW,refresh:rW}=useApi('/workers',10000);
    const{data:libs,refresh:rL}=useApi('/libraries',15000);

    useEffect(()=>{if(settings&&!lSettings)setLS({...settings})},[settings]);

    const s=dash||{status_stats:{},workers:[],processing:[],recent_complete:[],health_checking:[],next_queued:[],saved_gb:0,processing_enabled:false,scan_progress:{},hdr_stats:{}};
    const gc=st=>(s.status_stats[st]||{}).count||0;
    const totalQ=gc('queued')+gc('pending');

    const workers=useMemo(()=>{
        const aw=allW||[];const dw=s.workers||[];const map=new Map();
        aw.forEach(w=>map.set(w.id,{...w}));
        dw.forEach(w=>{const e=map.get(w.id);map.set(w.id,e?{...e,...w}:{...w});});
        const did=new Set(dw.map(w=>w.id));
        return Array.from(map.values()).map(w=>({...w,_on:did.has(w.id),_stale:!did.has(w.id)&&!!w.last_heartbeat}));
    },[allW,s.workers]);

                                <span style={{fontSize:10,color:T.in}}>{item.current_step||'Health check...'}</span>
                            </div>}

                        <span className="mono" style={{fontSize:10,color:T.t2}}>{item.video_codec||'--'}</span>
                        <span className="mono" style={{fontSize:10,color:T.t2}}>{item.resolution||'--'}</span>
                        <div>
                            <span className="mono" style={{fontSize:11,color:T.t3}}>{(item.file_size_gb||0).toFixed(1)} GB</span>

                            <SB T={T} title="Output Codec"><select value={lSettings.output_codec||'hevc'} onChange={e=>{setLS(s=>({...s,output_codec:e.target.value}));put('/settings',{output_codec:e.target.value})}} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="hevc">HEVC (H.265) — recommended</option><option value="h264">H.264 (AVC)</option><option value="av1">AV1</option></select></SB>
                            <SB T={T} title="Hardware Encoder"><select value={lSettings.hw_encoder||'nvenc'} onChange={e=>{setLS(s=>({...s,hw_encoder:e.target.value}));put('/settings',{hw_encoder:e.target.value})}} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}>
                                <option value="nvenc">NVENC (NVIDIA)</option><option value="qsv">QSV (Intel)</option><option value="vaapi">VAAPI (Linux)</option><option value="software">Software (x265)</option></select></SB>
                            <SB T={T} title="Hardware Decoding" desc="Use GPU to decode source file."><label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={(lSettings.hw_decode||'true')==='true'} onTog={()=>{const nv=lSettings.hw_decode==='true'?'false':'true';setLS(s=>({...s,hw_decode:nv}));put('/settings',{hw_decode:nv})}} T={T}/><span style={{fontSize:14,color:T.tx}}>{(lSettings.hw_decode||'true')==='true'?'Enabled':'Disabled'}</span></label></SB>
                            <SB T={T} title="Max Workers"><input type="range" min={0} max={6} value={lSettings.max_workers} onChange={e=>{setLS(s=>({...s,max_workers:e.target.value}));put('/settings',{max_workers:e.target.value})}} style={{width:'100%',background:`${T.t2}30`}}/><div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginTop:4}}><span style={{color:T.t2}}>0 = paused</span><span className="mono" style={{color:T.ac,fontWeight:700}}>{lSettings.max_workers}</span></div></SB>
                            <SB T={T} title="Min File Size (GB)"><input type="range" min={0} max={100} step={5} value={lSettings.min_size_gb} onChange={e=>{setLS(s=>({...s,min_size_gb:e.target.value}));put('/settings',{min_size_gb:e.target.value})}} style={{width:'100%',background:`${T.t2}30`}}/><span className="mono" style={{fontSize:13,color:T.ac,fontWeight:700}}>{lSettings.min_size_gb} GB</span></SB>
                        </div>}
                    </div>
                    {/* Notifications */}
                    <div style={{background:T.card,borderRadius:10,border:`1px solid ${T.bd}`,marginBottom:14,overflow:'hidden'}}>
                        <div onClick={()=>setStSections(s=>({...s,notify:!s.notify}))} style={{padding:'14px 18px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:stSections.notify?`1px solid ${T.bd}`:'none'}}>
                            <div style={{fontSize:14,fontWeight:700,color:T.t1}}>Notifications</div>
                            <I n={stSections.notify?'up':'down'} s={14} c={T.t3}/>
                        </div>
                        {stSections.notify&&<div style={{padding:'14px 18px'}}>
                            <SB T={T} title="ntfy.sh Notifications" desc="Push notifications when jobs complete or fail.">
                                <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',marginBottom:10}}>
                                    <Tog on={(lSettings.ntfy_enabled||'false')==='true'} onTog={()=>{const nv=lSettings.ntfy_enabled==='true'?'false':'true';setLS(s=>({...s,ntfy_enabled:nv}));put('/settings',{ntfy_enabled:nv})}} T={T}/>
                                    <span style={{fontSize:14,color:T.tx}}>{(lSettings.ntfy_enabled||'false')==='true'?'Enabled':'Disabled'}</span>
                                </label>
                                <div style={{marginBottom:8}}>
                                    <label style={{fontSize:11,color:T.t2,display:'block',marginBottom:4}}>ntfy Topic URL</label>
                                    <input value={lSettings.ntfy_url||''} onChange={e=>setLS(s=>({...s,ntfy_url:e.target.value}))} onBlur={e=>put('/settings',{ntfy_url:e.target.value})} placeholder="https://ntfy.sh/byte-transcode-alerts" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:6,padding:'10px 14px',color:T.tx,fontSize:13}}/>
                                </div>
                                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
                                    {[['ntfy_on_complete','Job Complete','true'],['ntfy_on_error','Job Error','true'],['ntfy_on_scan','Scan Complete','false']].map(([k,l,def_])=>
                                        <label key={k} style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:T.t3,cursor:'pointer'}}>
                                            <input type="checkbox" checked={(lSettings[k]||def_)==='true'} onChange={e=>{const v=e.target.checked?'true':'false';setLS(s=>({...s,[k]:v}));put('/settings',{[k]:v})}} style={{accentColor:T.ac}}/> {l}
                                        </label>)}
                                </div>
                                {lSettings.ntfy_url&&<button onClick={async()=>{try{await fetch(lSettings.ntfy_url,{method:'POST',body:'Byte Transcode test!'});toast('Test sent!','success')}catch(e){toast('Failed: '+e.message,'error')}}} style={{background:`${T.in}15`,border:`1px solid ${T.in}44`,borderRadius:6,padding:'6px 14px',cursor:'pointer',color:T.in,fontSize:12,fontWeight:600}}>Send Test</button>}
                            </SB>
                        </div>}
                    </div>
                </div>
                {/* RIGHT COLUMN */}
                <div>
                    {/* Output Settings */}
                    <div style={{background:T.card,borderRadius:10,border:`1px solid ${T.bd}`,marginBottom:14,overflow:'hidden'}}>
                        <div onClick={()=>setStSections(s=>({...s,output:!s.output}))} style={{padding:'14px 18px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:stSections.output?`1px solid ${T.bd}`:'none'}}>
                            <div style={{fontSize:14,fontWeight:700,color:T.t1}}>Output</div>
                            <I n={stSections.output?'up':'down'} s={14} c={T.t3}/>
                        </div>
                        {stSections.output&&<div style={{padding:'14px 18px'}}>
                            <SB T={T} title="Container"><select value={lSettings.container} onChange={e=>{setLS(s=>({...s,container:e.target.value}));put('/settings',{container:e.target.value})}} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'10px 14px',color:T.tx,fontSize:14}}><option value="mkv">MKV (recommended)</option><option value="mp4">MP4</option></select></SB>
                            <SB T={T} title="DoVi P7 → P8"><label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={lSettings.dovi_convert_p8==='true'} onTog={()=>{const nv=lSettings.dovi_convert_p8==='true'?'false':'true';setLS(s=>({...s,dovi_convert_p8:nv}));put('/settings',{dovi_convert_p8:nv})}} T={T}/><span style={{fontSize:14,color:T.tx}}>{lSettings.dovi_convert_p8==='true'?'Enabled':'Disabled'}</span></label></SB>
                            <SB T={T} title="Replace Original"><label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={lSettings.replace_original==='true'} onTog={()=>{const nv=lSettings.replace_original==='true'?'false':'true';setLS(s=>({...s,replace_original:nv}));put('/settings',{replace_original:nv})}} T={T}/><span style={{fontSize:14,color:T.tx}}>{lSettings.replace_original==='true'?'Replace originals':'Keep both (accept to replace)'}</span></label></SB>
                            <SB T={T} title="Auto-Accept"><label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={lSettings.auto_accept==='true'} onTog={()=>{const nv=lSettings.auto_accept==='true'?'false':'true';setLS(s=>({...s,auto_accept:nv}));put('/settings',{auto_accept:nv})}} T={T}/><span style={{fontSize:14,color:T.tx}}>{lSettings.auto_accept==='true'?'Enabled':'Manual review'}</span></label></SB>
                            <SB T={T} title="Skip Transcoded"><label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}><Tog on={lSettings.skip_transcoded==='true'} onTog={()=>{const nv=lSettings.skip_transcoded==='true'?'false':'true';setLS(s=>({...s,skip_transcoded:nv}));put('/settings',{skip_transcoded:nv})}} T={T}/><span style={{fontSize:14,color:T.tx}}>{lSettings.skip_transcoded==='true'?'Skip NVENC files':'Re-encode all'}</span></label></SB>
                        </div>}
                    </div>
                    {/* Appearance */}
                    <div style={{background:T.card,borderRadius:10,border:`1px solid ${T.bd}`,marginBottom:14,overflow:'hidden'}}>
                        <div onClick={()=>setStSections(s=>({...s,appear:!s.appear}))} style={{padding:'14px 18px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:stSections.appear?`1px solid ${T.bd}`:'none'}}>
                            <div style={{fontSize:14,fontWeight:700,color:T.t1}}>Appearance</div>
                            <I n={stSections.appear?'up':'down'} s={14} c={T.t3}/>
                        </div>
                        {stSections.appear&&<div style={{padding:'14px 18px'}}>
                            <SB T={T} title="Theme"><div style={{display:'flex',gap:10}}>{Object.entries(TH).map(([k,t])=><button key={k} onClick={()=>{setTheme(k);setLS(s=>({...s,theme:k}));put('/settings',{theme:k})}} style={{flex:1,padding:14,borderRadius:8,border:theme===k?`2px solid ${t.ac}`:`1px solid ${t.bd}`,background:t.bg,cursor:'pointer',textAlign:'center'}}><div style={{width:22,height:22,borderRadius:11,background:t.ac,margin:'0 auto 8px'}}/><div style={{fontSize:12,fontWeight:600,color:t.t1,textTransform:'capitalize'}}>{k}</div></button>)}</div></SB>
                        </div>}
                    </div>
                    {/* API */}
                    <div style={{background:T.card,borderRadius:10,border:`1px solid ${T.bd}`,marginBottom:14,overflow:'hidden'}}>
                        <div onClick={()=>setStSections(s=>({...s,api:!s.api}))} style={{padding:'14px 18px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:stSections.api?`1px solid ${T.bd}`:'none'}}>
                            <div style={{fontSize:14,fontWeight:700,color:T.t1}}>API</div>
                            <I n={stSections.api?'up':'down'} s={14} c={T.t3}/>
                        </div>
                        {stSections.api&&<div style={{padding:'14px 18px'}}>
                            <SB T={T} title="API Key"><div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                                <button onClick={()=>{let k='';try{k=crypto.randomUUID();}catch(e){k=Array.from({length:32},()=>Math.random().toString(36)[2]).join('');}setLS(s=>({...s,api_key:k}));put('/settings',{api_key:k});toast('Key generated','info')}} style={{background:`${T.ac}18`,border:`1px solid ${T.ac}44`,borderRadius:8,padding:'8px 16px',cursor:'pointer',color:T.ac,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><I n="key" s={13}/> Generate</button>
                                {lSettings.api_key&&<><code className="mono" style={{fontSize:11,color:T.t3,background:T.bg,padding:'6px 10px',borderRadius:6,border:`1px solid ${T.bd}`,wordBreak:'break-all',flex:1}}>{lSettings.api_key}</code>
                                    <button onClick={()=>{copyText(lSettings.api_key);toast('Copied!','success')}} style={{background:`${T.ok}15`,border:`1px solid ${T.ok}44`,borderRadius:8,padding:'7px 12px',cursor:'pointer',color:T.ok,fontSize:11,fontWeight:600}}><I n="copy" s={12}/></button></>}
                            </div></SB>
                        </div>}
                    </div>
                </div>
            </div>
        </div>}


        {/*═══ PROFILE ═══*/}
        {tab==='profile'&&lSettings&&<div>
            <h1 style={{fontSize:24,fontWeight:700,color:T.t1,marginBottom:18}}>Profile</h1>
            <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:20}}>
                {/* LEFT: Avatar */}
                <div style={{background:T.card,borderRadius:12,border:`1px solid ${T.bd}`,padding:24,textAlign:'center'}}>
                    <div style={{width:120,height:120,borderRadius:60,margin:'0 auto 16px',background:`${T.t2}20`,border:`3px solid ${T.bd}`,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {lSettings.avatar_base64?<img src={lSettings.avatar_base64} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<I n="user" s={48} c={T.t2}/>}
                    </div>
                    <label style={{display:'inline-flex',alignItems:'center',gap:6,background:`${T.ac}18`,border:`1px solid ${T.ac}44`,borderRadius:8,padding:'8px 16px',cursor:'pointer',color:T.ac,fontSize:12,fontWeight:600}}>
                        <I n="download" s={13}/> Upload Photo
                        <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024){toast('Max 2MB','error');return;}const r=new FileReader();r.onload=ev=>{setLS(s=>({...s,avatar_base64:ev.target.result}));put('/settings',{avatar_base64:ev.target.result});toast('Avatar updated','success')};r.readAsDataURL(f)}}/>
                    </label>
                    {lSettings.avatar_base64&&<button onClick={()=>{setLS(s=>({...s,avatar_base64:''}));put('/settings',{avatar_base64:''});toast('Avatar removed','info')}} style={{display:'block',margin:'10px auto 0',background:'none',border:'none',cursor:'pointer',color:T.t2,fontSize:11}}>Remove</button>}
                </div>
                {/* RIGHT: Profile fields */}
                <div>
                    <SB T={T} title="Display Name" desc="Shown in the sidebar and dashboard.">
                        <input value={lSettings.display_name||''} onChange={e=>setLS(s=>({...s,display_name:e.target.value}))} onBlur={e=>{put('/settings',{display_name:e.target.value});toast('Name saved','success')}} placeholder={settings?.auth_user||'admin'} style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14}}/>
                    </SB>
                    <SB T={T} title="Username" desc="Login username. Changes take effect next login.">
                        <div style={{display:'flex',gap:10}}>
                            <input value={lSettings._new_user||settings?.auth_user||''} onChange={e=>setLS(s=>({...s,_new_user:e.target.value}))} style={{flex:1,background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14}}/>
                            <button onClick={async()=>{if(!lSettings._new_user){toast('Enter a username','error');return;}if(!confirm('Change login username to "'+lSettings._new_user+'"?'))return;await put('/settings',{auth_user:lSettings._new_user});toast('Username updated','success');rS()}} style={{background:`${T.ac}18`,border:`1px solid ${T.ac}44`,borderRadius:8,padding:'10px 18px',cursor:'pointer',color:T.ac,fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>Update</button>
                        </div>
                    </SB>
                    <SB T={T} title="Change Password" desc="Enter current password to set a new one.">
                        <div style={{display:'flex',flexDirection:'column',gap:10}}>
                            <input type="password" placeholder="Current password" id="pw_cur" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14}}/>
                            <input type="password" placeholder="New password" id="pw_new" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14}}/>
                            <input type="password" placeholder="Confirm new password" id="pw_conf" style={{width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.bd}`,borderRadius:8,padding:'12px 16px',color:T.tx,fontSize:14}}/>
                            <button onClick={async()=>{const cur=document.getElementById('pw_cur').value;const nw=document.getElementById('pw_new').value;const cf=document.getElementById('pw_conf').value;if(!cur||!nw){toast('Fill all fields','error');return;}if(nw!==cf){toast('Passwords don\'t match','error');return;}if(nw.length<4){toast('Min 4 characters','error');return;}const r=await post('/auth/change-password',{current:cur,password:nw});if(r?.ok){toast('Password changed','success');document.getElementById('pw_cur').value='';document.getElementById('pw_new').value='';document.getElementById('pw_conf').value='';}else{toast(r?.error||'Failed','error')}}} style={{background:`linear-gradient(135deg,${T.ac},${T.a2})`,border:'none',borderRadius:8,padding:'12px',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>Change Password</button>
                        </div>
                    </SB>
                </div>
            </div>
        </div>}

        {/*═══ LOGS ═══*/}
        {tab==='logs'&&<div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
                <h1 style={{fontSize:24,fontWeight:700,color:T.t1}}>System Logs</h1>
                <div style={{display:'flex',gap:8}}>
                    <a href="/api/logs/download" style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:8,padding:'8px 14px',color:T.t3,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4,textDecoration:'none'}}><I n="download" s={13}/> Download</a>
                    <button onClick={rLg} style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:8,padding:'8px 14px',cursor:'pointer',color:T.t3,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><I n="refresh" s={13}/> Refresh</button>
                </div></div>
            <div className="mono" style={{background:'#08090c',borderRadius:10,padding:16,fontSize:13,lineHeight:'20px',maxHeight:'75vh',overflowY:'auto',border:`1px solid ${T.bd}`}}>
                {(logs||[]).map(l=><div key={l.id} style={{color:l.level==='ERROR'?T.er:l.level==='WARN'?T.wn:T.t2,marginBottom:2}}>
                    <span style={{opacity:0.5}}>{fmtTime(l.timestamp,'full')}</span>{' '}<span style={{color:l.level==='ERROR'?T.er:l.level==='WARN'?T.wn:T.in,fontWeight:600}}>[{l.level}]</span>{' '}<span style={{opacity:0.6}}>[{l.source}]</span>{' '}{l.message}
                </div>)}
                {(!logs||logs.length===0)&&<div style={{color:T.t2}}>No logs yet.</div>}
            </div>
        </div>}

        </main>
        {selFile&&<FileModal item={selFile} T={T} onClose={()=>setSelFile(null)} onAct={fileAct}/>}
    </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Toasts><App/></Toasts></ErrorBoundary>);
</script>
</body>
</html>
